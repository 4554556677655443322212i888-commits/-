<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتائج والنصائح الطبية - تشخيصي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('images/ai.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            padding: 45px;
            border-radius: 35px;
            border: 1px solid rgba(87, 193, 255, 0.2);
            width: 90%;
            max-width: 750px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #57c1ff;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .diagnosis-display-box {
            background: rgba(0, 163, 218, 0.1);
            border-right: 6px solid #00e5ff;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 35px;
            text-align: right;
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .tip-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 12px;
            text-align: right;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 17px;
        }

        /* تنسيق منطقة الأزرار */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
            min-width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-home {
            background: #00e5ff;
            color: #0f172a;
        }

        .btn-dash {
            background: transparent;
            color: #00e5ff;
            border: 2px solid #00e5ff;
        }

        .btn-print {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="diagnosis.html">فحص جديد</a>
        <a href="login.html">خروج</a>
    </nav>

    <div class="container">
        <div class="result-card">
            <div style="font-size: 60px; margin-bottom: 10px;">🩺</div>
            <h2 id="pageHeader">📋 تقرير الحالة الصحية</h2>

            <div id="diagnosisBox" class="diagnosis-display-box">
                <h4><span>🔍</span> نتيجة التحليل الذكي:</h4>
                <p id="resultContent" style="font-size: 19px; line-height: 1.8;"></p>
                <div style="margin-top: 10px; font-size: 15px; color: #57c1ff;">
                    حرارة الجسم: <span id="resTemp">--</span> | الضغط: <span id="resBP">--</span>
                </div>
            </div>

            <h3 style="text-align: right; color: #57c1ff; margin-right: 10px;">💡 توصيات الرعاية:</h3>
            <div class="tip-item">💧 شرب كميات كافية من السوائل لتعزيز المناعة.</div>
            <div class="tip-item">🏃‍♂️ تجنب المجهود البدني الشديد لمدة 24 ساعة.</div>
            <div class="tip-item">⚠️ يرجى مراجعة المختص في حال زيادة شدة الأعراض.</div>

            <div class="action-buttons">
                <a href="index.html" class="btn btn-home">العودة للرئيسية</a>

                <a href="dashboard.html" class="btn btn-dash">لوحة التحكم</a>

                <button onclick="window.print()" class="btn btn-print">🖨️ طباعة التقرير</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = function () {
            // جلب البيانات المخزنة من صفحة الفحص
            const report = localStorage.getItem('finalDiagnosis');
            const temp = localStorage.getItem('userTemp');
            const bp = localStorage.getItem('userBP');

            const box = document.getElementById('diagnosisBox');
            const content = document.getElementById('resultContent');

            if (report) {
                box.style.display = "block";
                content.innerText = report;
                document.getElementById('resTemp').innerText = temp + " °C";
                document.getElementById('resBP').innerText = bp;
            } else {
                document.getElementById('pageHeader').innerText = "💡 نصائح صحية عامة";
                box.style.display = "none";
            }
        }
    </script>
</body>

</html>
