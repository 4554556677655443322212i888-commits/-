<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - تشخيصي</title>
    <!-- استدعاء نفس خط الصفحة الرئيسية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #57c1ff;
            --btn-blue: #00a3da;
            --dark-blue: #0a192f;
            --light-blue: #e0f7fa;
        }

        body {
            font-family: 'Cairo', sans-serif;
            /* توحيد الخط */
            background: linear-gradient(rgba(10, 25, 47, 0.8), rgba(10, 25, 47, 0.8)),
                url('images/ai.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(87, 193, 255, 0.2);
            border-radius: 30px;
            /* جعل الحواف أنعم */
            padding: 50px 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h2 {
            color: var(--primary-blue);
            margin-bottom: 35px;
            font-weight: 700;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(87, 193, 255, 0.3);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--light-blue);
            font-weight: bold;
            font-size: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.4s;
            font-family: 'Cairo', sans-serif;
        }

        .input-group input:focus {
            border-color: var(--primary-blue);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(87, 193, 255, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--btn-blue), var(--primary-blue));
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 5px 15px rgba(0, 163, 218, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(87, 193, 255, 0.5);
        }

        .footer-links {
            margin-top: 30px;
            font-size: 15px;
            color: #d1d1d1;
        }

        .footer-links a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .back-home {
            display: inline-block;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .back-home:hover {
            color: white;
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <!-- أيقونة القفل بتأثير نبض خفيف -->
        <div style="font-size: 60px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(87, 193, 255, 0.4));">🔐
        </div>
        <h2>تسجيل الدخول</h2>

        <!-- الربط بصفحة التشخيص أو الـ Dashboard -->
        <form onsubmit="event.preventDefault(); window.location.href='diagnosis.html';">
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">دخول للوحة التحكم</button>
        </form>

        <div class="footer-links">
            ليس لديك حساب؟ <a href="register.html">أنشئ حساباً الآن</a> <br>
            <a href="index.html" class="back-home">← العودة للرئيسية</a>
        </div>
    </div>

</body>

</html>
