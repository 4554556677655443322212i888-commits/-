<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - تشخيصي AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            min-height: 100vh;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .sidebar a:hover,
        .active {
            background: #00e5ff;
            color: #0f172a;
            font-weight: bold;
        }

        /* المحتوى الرئيسي */
        .main {
            flex: 1;
            padding: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            text-align: center;
        }

        .card h3 {
            color: #00e5ff;
            font-size: 16px;
            margin: 0;
        }

        .card p {
            font-size: 24px;
            margin: 10px 0;
        }

        .btn-new {
            background: #00e5ff;
            color: #0f172a;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>تشخيصي</h2>
        <a href="dashboard.html" class="active">🏠 الرئيسية</a>
        <a href="diagnosis.html">🔍 فحص جديد</a>
        <a href="library.html">📚 المكتبة</a>
        <a href="index.html" style="color: #ff5757; margin-top: 50px;">🚪 خروج</a>
    </div>
    <div class="main">
        <h1>أهلاً بك في ملفك الصحي 👋</h1>
        <div class="stats-grid">
            <div class="card">
                <h3>آخر حرارة</h3>
                <p id="d-temp">--</p><span>°C</span>
            </div>
            <div class="card">
                <h3>آخر ضغط</h3>
                <p id="d-bp">--</p>
            </div>
            <div class="card">
                <h3>آخر نبض</h3>
                <p id="d-pulse">--</p>
            </div>
        </div>
        <div class="card" style="text-align: right; margin-bottom: 30px;">
            <h3 style="margin-bottom: 15px;">🔍 ملخص آخر فحص:</h3>
            <p id="d-result" style="font-size: 18px; color: #cbd5e1;">لم تقم بإجراء فحوصات بعد.</p>
        </div>
        <a href="diagnosis.html" class="btn-new">إجراء فحص جديد الآن</a>
    </div>

    <script>
        window.onload = function () {
            // سحب البيانات اللي خزنها الفحص وعرضها هنا
            if (localStorage.getItem('userTemp')) document.getElementById('d-temp').innerText = localStorage.getItem('userTemp');
            if (localStorage.getItem('userBP')) document.getElementById('d-bp').innerText = localStorage.getItem('userBP');
            if (localStorage.getItem('userPulse')) document.getElementById('d-pulse').innerText = localStorage.getItem('userPulse');
            if (localStorage.getItem('finalDiagnosis')) document.getElementById('d-result').innerText = localStorage.getItem('finalDiagnosis');
        }
    </script>
</body>

</html>
