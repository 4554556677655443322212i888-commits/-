<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء ملف طبي جديد - تشخيصي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            /* حافظنا على الخلفية الأصلية مع تحسين طفيف في التباين */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('images/ai.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(87, 193, 255, 0.2);
            border-radius: 30px;
            padding: 45px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-card h2 {
            color: #57c1ff;
            margin-bottom: 25px;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(87, 193, 255, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: bold;
            color: #cbd5e1;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.3s ease;
            box-sizing: border-box;
        }

        /* تنسيق الكلام داخل القائمة المنسدلة */
        .form-group select option {
            background: #0f172a;
            color: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #57c1ff;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(87, 193, 255, 0.2);
        }

        .row-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #00a3da, #57c1ff);
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(0, 163, 218, 0.3);
            font-family: 'Cairo', sans-serif;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(87, 193, 255, 0.5);
            filter: brightness(1.1);
        }

        .login-link {
            margin-top: 25px;
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .login-link span {
            color: #57c1ff;
            font-weight: bold;
        }

        .login-link:hover span {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="register-card">
        <!-- أيقونة الملف الطبي -->
        <div style="font-size: 55px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(87, 193, 255, 0.4));">📋
        </div>
        <h2>إنشاء ملف طبي جديد</h2>

        <form action="diagnosis.html"> <!-- الربط بصفحة التشخيص مباشرة بعد التسجيل -->
            <div class="form-group">
                <label>الاسم بالكامل</label>
                <input type="text" placeholder="مثلاً: سارة أحمد" required>
            </div>

            <div class="row-group">
                <div class="form-group">
                    <label>النوع</label>
                    <select required>
                        <option value="" disabled selected>اختر</option>
                        <option>ذكر</option>
                        <option>أنثى</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>السن</label>
                    <input type="number" placeholder="20" required>
                </div>
            </div>

            <div class="form-group">
                <label>فصيلة الدم</label>
                <select required>
                    <option value="" disabled selected>اختر الفصيلة</option>
                    <option>A+</option>
                    <option>B+</option>
                    <option>O+</option>
                    <option>AB+</option>
                    <option>A-</option>
                    <option>B-</option>
                    <option>O-</option>
                </select>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="name@example.com" required>
            </div>

            <button type="submit" class="btn-register">حفظ البيانات وإنشاء الملف</button>
        </form>

        <a href="login.html" class="login-link">لديك حساب بالفعل؟ <span>تسجيل الدخول</span></a>
    </div>

</body>

</html>
