<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تشخيصي الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            /* حافظنا على الباك جروند بتاعتك مع تحسين الطبقة الشفافة */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('images/ai.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }

        /* إضافة شريط تنقل علوي بسيط */
        .navbar {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #57c1ff;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .page-title {
            font-size: 40px;
            font-weight: bold;
            color: #57c1ff;
            margin-top: 30px;
            text-shadow: 0 0 15px rgba(87, 193, 255, 0.5);
            letter-spacing: 1px;
        }

        .banner-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin-top: 40px;
            width: 90%;
            max-width: 1200px;
        }

        .banner-left {
            flex: 1.2;
        }

        .welcome-text {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.3;
            color: #ffffff;
        }

        .info-card {
            background: rgba(30, 41, 59, 0.6);
            /* أغمق قليلاً للوضوح */
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 30px;
            border: 1px solid rgba(87, 193, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .info-card h3 {
            color: #57c1ff;
            margin-top: 0;
            font-size: 24px;
            border-bottom: 1px solid rgba(87, 193, 255, 0.2);
            padding-bottom: 10px;
            display: inline-block;
        }

        .info-card ul {
            list-style: none;
            padding: 0;
            margin: 25px 0;
        }

        .info-card li {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 19px;
        }

        .info-card li::before {
            content: "✓";
            color: #57c1ff;
            font-weight: bold;
            background: rgba(87, 193, 255, 0.1);
            padding: 2px 8px;
            border-radius: 50%;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            transition: 0.4s all ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00a3da, #57c1ff);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 163, 218, 0.3);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-tips {
            grid-column: span 2;
            background: rgba(87, 193, 255, 0.08);
            color: #57c1ff;
            border: 1px dashed #57c1ff;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(87, 193, 255, 0.4);
            border-color: #57c1ff;
        }

        /* تحسين أيقونة الـ DNA */
        .ai-icon-container {
            background: rgba(87, 193, 255, 0.05);
            padding: 60px;
            border-radius: 50%;
            border: 2px solid rgba(87, 193, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(87, 193, 255, 0.2);
            animation: float 4s ease-in-out infinite;
        }

        .ai-icon-container span {
            display: inline-block;
            filter: drop-shadow(0 0 10px #57c1ff);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        @media (max-width: 768px) {
            .banner-container {
                flex-direction: column;
                text-align: center;
            }

            .welcome-text {
                font-size: 32px;
            }

            .button-grid {
                grid-template-columns: 1fr;
            }

            .btn-tips {
                grid-column: span 1;
            }

            .ai-icon-container {
                order: -1;
                margin-bottom: 30px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="diagnosis.html">ابدأ الفحص</a>
        <a href="library.html">مكتبة الأمراض</a>
        <a href="login.html">تسجيل الدخول</a>
    </nav>

    <div class="container">
        <div class="page-title">نظام تشخيصي الذكي</div>

        <div class="banner-container">
            <div class="banner-left">
                <div class="welcome-text">مستقبل الرعاية الصحية بين يديك</div>

                <div class="info-card">
                    <h3>خدماتنا الذكية</h3>
                    <ul>
                        <li>تحليل فوري بالأشعة والذكاء الاصطناعي</li>
                        <li>توصيات طبية دقيقة مبنية على بيانات</li>
                        <li>متابعة الحالة الصحية على مدار الساعة</li>
                    </ul>

                    <div class="button-grid">
                        <a href="diagnosis.html" class="btn btn-primary">ابدأ التشخيص الآن</a>
                        <a href="login.html" class="btn btn-outline">تسجيل الدخول</a>
                        <a href="tips.html" class="btn btn-tips">💡 نصائح طبية وقائية</a>
                    </div>
                </div>
            </div>

            <div class="banner-right">
                <div class="ai-icon-container">
                    <span style="font-size: 100px;">🧬</span>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
